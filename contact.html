<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="no">
    <title>Cristian Pirovano - Contact</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <h1>CRISTIAN PIROVANO</h1>
                <p data-i18n="nav.photographer"></p>
            </div>
            <div class="nav-right">
                <button id="menuToggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul id="menu">
                    <li><a href="/index.html" data-i18n="nav.home"></a></li>
                    <li><a href="/shop.html" data-i18n="nav.shop"></a></li>
                    <li><a href="/gallery.html" data-i18n="nav.gallery"></a></li>
                    <li><a href="/bio.html" data-i18n="nav.bio"></a></li>
                    <li class="language-switcher">
                        <button onclick="changeLanguage('en')">EN</button>
                        <button onclick="changeLanguage('es')">ES</button>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content">
        <section class="contact">
            <form 
                id="contactForm"
                action="https://formspree.io/f/xgvepvao"
                method="post"
            >
                <div class="form-group">
                    <label data-i18n="contactForm.name" for="name"></label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label data-i18n="contactForm.email" for="email"></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label data-i18n="contactForm.subject" for="subject"></label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label data-i18n="contactForm.message" for="message"></label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button data-i18n="contactForm.submitBtn" type="submit" class="submit-btn"></button>
            </form>
        </section>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/21.6.10/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-http-backend/1.3.2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/6.1.3/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
