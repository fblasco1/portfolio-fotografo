<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="no">
    <title>Cristian Pirovano - Shop</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/shop.css">
</head>
<body class="i18n-loading">
    <header>
        <nav>
            <div class="nav-left">
                <h1>CRISTIAN PIROVANO</h1>
                <p data-i18n="nav.photographer"></p>
            </div>
            <div class="nav-right">
                <button id="menuToggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul id="menu">
                    <li><a href="/index.html" data-i18n="nav.home"></a></li>
                    <li><a href="/gallery.html" data-i18n="nav.gallery"></a></li>
                    <li><a href="/bio.html" data-i18n="nav.bio"></a></li>
                    <li><a href="/contact.html" data-i18n="nav.contact"></a></li>
                    <li class="language-switcher">
                        <button onclick="changeLanguage('en')">EN</button>
                        <button onclick="changeLanguage('es')">ES</button>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content">
        <div id="loading-overlay">Cargando...</div>
        <!-- Cart Section -->
        <div id="cart-section" class="cart-section">
            <h2 data-i18n="shop.cart.title"></h2>
            <div id="cart-items" class="cart-items"></div>
            <button id="checkout-button" class="checkout-button" data-i18n="shop.cart.checkout"></button>
        </div>
        
        <!-- Photo Grid -->
        <div id="photo-grid"></div>
        
        <!-- Image Preview Modal -->
        <div id="image-modal" class="modal">
            <span class="close">&times;</span>
            <img id="modal-image" class="modal-content">
        </div>
        
        <!-- Checkout Form Modal -->
        <div id="checkout-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 data-i18n="shop.checkout.title"></h2>
                <form 
                    id="checkout-form"
                    action="https://formspree.io/f/xwpkyabj"
                    method="POST"
                >
                    <div class="form-group">
                        <label for="name" data-i18n="shop.checkout.name"></label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email" data-i18n="shop.checkout.email"></label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="address" data-i18n="shop.checkout.address"></label>
                        <textarea id="address" name="address" required></textarea>
                    </div>
                    <div id="selected-photos-list" class="selected-photos-list"></div>
                    <button type="submit" data-i18n="shop.checkout.submit"></button>
                </form>
            </div>
        </div>
    </main>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/21.6.10/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-http-backend/1.3.2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/6.1.3/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/shop.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
