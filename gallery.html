<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="no">
    <title>Cristian Pirovano - Gallery</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/catalog.css">
</head>
<body class="i18n-loading">
    <header>
        <nav>
            <div class="nav-left">
                <h1>CRISTIAN PIROVANO</h1>
                <p data-i18n="nav.photographer"></p>
            </div>
            <div class="nav-right">
                <button id="menuToggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul id="menu">
                    <li><a href="/index.html" data-i18n="nav.home"></a></li>
                    <li><a href="/shop.html" data-i18n="nav.shop"></a></li>
                    <li><a href="/bio.html" data-i18n="nav.bio"></a></li>
                    <li><a href="/contact.html" data-i18n="nav.contact"></a></li>
                    <li class="language-switcher">
                        <button onclick="changeLanguage('en')">EN</button>
                        <button onclick="changeLanguage('es')">ES</button>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content">
        <div id="loading-overlay">Cargando...</div>
        <h2 data-i18n="gallery.title">Gallery</h2>
        <div class="folder-grid" id="folderGrid"></div>
        
        <div id="carouselModal" class="modal" aria-hidden="true" style="display: none;">
            <button class="close" aria-label="Close modal">&times;</button>
            <div class="carousel">
                <button class="carousel-button prev" aria-label="Previous image">&lt;</button>
                <div class="carousel-content">
                    <img class="modal-content" id="carouselImg" alt="">
                    <div id="carouselDescription" class="carousel-description"></div>
                </div>
                <button class="carousel-button next" aria-label="Next image">&gt;</button>
            </div>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/21.6.10/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-http-backend/1.3.2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/6.1.3/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/catalog.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
